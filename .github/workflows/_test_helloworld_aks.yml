name: Test Hello World AKS Workload

on:
  workflow_call:
    inputs:
      workflow-id:
        description: "Workflow ID"
        required: true
        type: string
      cluster-name:
        required: true
        description: "AKS Cluster Name"
        type: string

jobs:
  test-helloworld-aci:
    name: Test Hello World AKS
    runs-on: ubuntu-latest
    env: 
        RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }} 
        WORKFLOW_ID: ${{ inputs.workflow-id }}
        CLUSTER_NAME: ${{ inputs.cluster-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log into Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Service IP Address
        run: |
          az aks get-credentials --name $CLUSTER_NAME --resource-group $RESOURCE_GROUP  --overwrite-existing
          echo SERVICE_IP=$(kubectl get services helloworld-service \
            --output jsonpath='{.status.loadBalancer.ingress[0].ip}' \
            | tr -d \'
          ) >> $GITHUB_ENV

      - name: Check Curl Results
        run: |
          echo "Running curl test on $SERVICE_IP:80"
          TEST_RESPONSE=$(curl -s $SERVICE_IP:80)
          if [[ ! $TEST_RESPONSE =~ "Confidential Pods on Azure Kubernetes Service!" ]]; then
              echo "Curl did not return expected result"
              echo $TEST_RESPONSE
              exit 1
          fi

